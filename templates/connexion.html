{% extends "base.html" %}
{% block title %}Administration — Rattan House{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Rattan House">
    </div>
    <h2 class="auth-title">Administration</h2>
    <p class="auth-sub">Accès réservé à l'équipe Rattan House.</p>
    <div class="auth-error" id="loginErr"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="admin@rattanhouse.ma" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="loginPwd" class="form-control" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button onclick="doConnexion()" class="btn-primary btn-full" style="margin-top:8px">
      Se connecter
    </button>
    <div style="text-align:center;margin-top:16px">
      <a href="/" style="font-size:13px;color:var(--text-light)">← Retour au site</a>
    </div>
  </div>
</div>
{% endblock %}
