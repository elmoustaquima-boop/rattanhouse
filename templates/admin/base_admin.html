<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin — Rattan House{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="admin-wrap">
  <aside class="admin-side">
    <div class="admin-side-head">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Rattan House" style="height:44px;width:44px;object-fit:contain;border-radius:50%;background:white;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,0.2)">
        <div style="line-height:1.1">
          <div style="font-family:var(--font-display);font-size:14px;font-weight:600;color:white;letter-spacing:2px">RATTAN</div>
          <div style="font-family:var(--font-display);font-size:14px;font-weight:600;color:white;letter-spacing:2px">HOUSE</div>
        </div>
      </div>
      <p>Espace Gestionnaire</p>
    </div>
    <nav class="admin-side-nav">
      <a href="/admin">
        <span class="nav-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></span>
        Tableau de bord
      </a>
      <a href="/admin/produits">
        <span class="nav-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22V6M12 6C10 2 5 2 3 4M12 6c2-4 7-4 9-2M8 10c-2-1-4 0-5 2M16 10c2-1 4 0 5 2"/></svg></span>
        Produits
      </a>
      <a href="/admin/promotions">
        <span class="nav-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></span>
        Promotions
      </a>
      <a href="/admin/sur-mesure">
        <span class="nav-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span>
        Sur Mesure
      </a>
      <a href="/" style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.07);padding-top:14px">
        <span class="nav-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></span>
        Voir le site
      </a>
      <a href="/deconnexion">
        <span class="nav-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        Déconnexion
      </a>
    </nav>
  </aside>
  <div class="admin-main-area">
    <div class="admin-topbar">
      <h1>{% block page_title %}{% endblock %}</h1>
      <span style="font-size:13px;color:var(--text-light)">Rattan House — Administration</span>
    </div>
    <div class="admin-content">
      {% block admin_content %}{% endblock %}
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
